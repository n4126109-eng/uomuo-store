<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Aura & Essence</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Aura & Essence</div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalog.html">Catálogo</a>
            <a href="contact.html">Contacto</a>
        </div>
    </nav>

    <div class="catalog-container" id="perfume-grid">
        <!-- Los 25 perfumes se cargarán aquí mediante JS -->
    </div>

    <script>
        const perfumes = [
            { name: "Chanel No. 5", price: 650, img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=500" },
            { name: "Le Male - JPG", price: 480, img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=500" },
            { name: "Bleu de Chanel", price: 590, img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=500" },
            { name: "Scandal - JPG", price: 520, img: "https://images.unsplash.com/photo-1590736704728-f4730bb30770?w=500" },
            { name: "Coco Mademoiselle", price: 680, img: "https://images.unsplash.com/photo-1585232004423-244e0e6904e3?w=500" },
            // ... (Añadir hasta 25 siguiendo este patrón)
        ];

        // Para completar los 25 rápidamente para el ejemplo
        for(let i=6; i<=25; i++) {
            perfumes.push({
                name: `Fragancia Elite N° ${i}`,
                price: Math.floor(Math.random() * (800 - 300) + 300),
                img: `https://images.unsplash.com/photo-1563170351-be82bc888bb4?w=500&sig=${i}`
            });
        }

        const grid = document.getElementById('perfume-grid');
        perfumes.forEach(p => {
            grid.innerHTML += `
                <div class="perfume-card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">S/ ${p.price}.00</p>
                    <button class="btn-luxury" style="color:black; border-color:black; padding: 0.5rem 1rem; font-size: 0.7rem;">Ver Detalle</button>
                </div>
            `;
        });
    </script>
</body>
</html>
