<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Aura & Essence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Aura & Essence</div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalog.html">Catálogo</a>
            <a href="contact.html">Contacto</a>
        </div>
    </nav>

    <h2 style="text-align: center; margin-top: 50px; font-family: 'Playfair Display'; font-size: 40px;">Nuestra Colección</h2>

    <div class="catalog-grid" id="perfume-list"></div>

    <script>
        const perfumes = [
            { n: "Chanel N°5", p: 750, id: "1541643600914-78b084683601" },
            { n: "Le Male - JPG", p: 480, id: "1594035910387-fea47794261f" },
            { n: "Scandal", p: 520, id: "1590736704728-f4730bb30770" },
            { n: "Bleu de Chanel", p: 620, id: "1523293182086-7651a899d37f" },
            { n: "Coco Mademoiselle", p: 710, id: "1585232004423-244e0e6904e3" },
            { n: "La Belle - JPG", p: 495, id: "1615335150150-b984039868c2" },
            { n: "Dior Sauvage", p: 580, id: "1559067513-81797f90924a" },
            { n: "Libre - YSL", p: 540, id: "1592945403244-b3fbafd7f539" }
        ];

        // Autogenerar hasta 25 para cumplir el requerimiento
        for(let i=9; i<=25; i++) {
            perfumes.push({
                n: `Fragancia Privée N°${i}`,
                p: Math.floor(Math.random() * (900 - 350) + 350),
                id: "1563170351-be82bc888bb4"
            });
        }

        const container = document.getElementById('perfume-list');
        perfumes.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-${item.id}?w=400&q=80" alt="${item.n}">
                    <h3>${item.n}</h3>
                    <p class="price">S/ ${item.p}.00</p>
                    <a href="#" class="btn" style="color:black; border-color:black; font-size:10px; padding:10px;">Añadir al Carrito</a>
                </div>
            `;
        });
    </script>

    <footer><p>&copy; 2026 Aura & Essence</p></footer>
</body>
</html>
