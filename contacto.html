<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>UOMUO | Contacto</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo-container">
      <img src="https://i.imgur.com/q5L6m6L.jpeg" alt="UOMUO Logo" class="logo">
      <h1>UOMUO</h1>
    </div>

    <nav>
      <a href="index.html">Inicio</a>
      <a href="catalog.html">Catálogo</a>
      <a href="contact.html">Contacto</a>
    </nav>
  </header>

  <!-- CONTACT -->
  <section class="contact-section">

    <div class="contact-container fade-in">

      <!-- FORM -->
      <div class="contact-form glass-card">
        <h2>Contáctanos</h2>

        <form>
          <input type="text" placeholder="Nombre Completo" required>
          <input type="email" placeholder="Correo Electrónico" required>
          <textarea rows="6" placeholder="Tu mensaje"></textarea>

          <button type="submit" class="btn-luxury">
            Enviar Mensaje
          </button>
        </form>

        <!-- SOCIAL -->
        <div class="socials">
          <a href="https://instagram.com" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>

          <a href="https://facebook.com" target="_blank">
            <i class="fab fa-facebook"></i>
          </a>

          <a href="https://wa.me/51900000000" target="_blank">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>

      <!-- MAP -->
      <div class="map-container glass-card">
        <iframe
          src="https://www.google.com/maps?q=Av.+Javier+Prado+Este+2500,+San+Isidro,+Lima,+Perú&output=embed"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 UOMUO — Perfumería de Alta Gama</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
