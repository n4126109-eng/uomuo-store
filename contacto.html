<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Aura & Essence</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav>
        <div class="logo">Aura & Essence</div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="catalog.html">Catálogo</a>
            <a href="contact.html">Contacto</a>
        </div>
    </nav>

    <section style="padding: 8rem 5%;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px;">
            <div>
                <h2 style="font-family: var(--font-titles); font-size: 2.5rem; margin-bottom: 2rem;">Contáctanos</h2>
                <p>Av. Javier Prado Este 2500, San Isidro, Lima.</p><br>
                <p>WhatsApp: <a href="https://wa.me/51900000000" style="color: var(--gold);">+51 900 000 000</a></p><br>
                <div class="social-icons">
                    <p>Síguenos: @aura_essence_perfumes</p>
                </div>
            </div>
            
            <div style="background: #f9f9f9; padding: 2rem; border-radius: 5px;">
                <form>
                    <input type="text" placeholder="Nombre" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd;">
                    <input type="email" placeholder="Email" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd;">
                    <textarea placeholder="Mensaje" rows="5" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd;"></textarea>
                    <button type="submit" class="btn-luxury" style="color: black; border-color: black; width: 100%;">Enviar</button>
                </form>
            </div>
        </div>

        <div style="margin-top: 4rem;">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.4251264426544!2d-77.012345!3d-12.087654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c8667a42173f%3A0x6e28881f1816e00e!2sAv.%20Javier%20Prado%20Este%202500%2C%20San%20Borja%2015021!5e0!3m2!1ses!2spe!4v1625000000000!5m2!1ses!2spe" 
                width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <footer>
